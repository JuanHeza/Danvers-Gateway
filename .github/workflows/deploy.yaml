name: Deploy Gateway

on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        run: go build -o gateway ./cmd/gateway

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-binary
          path: gateway

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: gateway-binary
          path: .

      - name: Copy binary to Raspberry
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.RPI_HOST }}
          username: ${{ secrets.RPI_USER }}
          key: ${{ secrets.RPI_SSH_KEY }}
          source: "gateway"
          target: "/home/${{ secrets.RPI_USER }}/gateway"

      - name: Restart service on Raspberry
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.RPI_HOST }}
          username: ${{ secrets.RPI_USER }}
          key: ${{ secrets.RPI_SSH_KEY }}
          script: |
            sudo systemctl stop gateway.service
            sudo mv /home/${{ secrets.RPI_USER }}/gateway /usr/local/bin/gateway
            sudo systemctl start gateway.service
            sudo systemctl status gateway.service --no-pager
  
  deploy-selfhosted:
    runs-on: self-hosted   # Se ejecuta directamente en tu Raspberry
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and replace binary
        run: |
          go build -o /usr/local/bin/gateway ./cmd/gateway
          sudo systemctl stop gateway.service
          sudo systemctl start gateway.service
          sudo systemctl status gateway.service --no-pager