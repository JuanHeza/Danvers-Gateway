name: Deploy Gateway

on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy-selfhosted:
  runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and replace binary
        run: |
          go build -o /usr/local/bin/gateway ./cmd/gateway
          sudo systemctl stop gateway.service
          sudo systemctl start gateway.service
          sudo systemctl status gateway.service --no-pager