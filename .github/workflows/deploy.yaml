name: Deploy Gateway

on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy-selfhosted:
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and replace binary
        run: |
          go build -o DanversGateway .
          sudo mkdir -p /opt/danvers-gateway
          sudo mv DanversGateway /opt/danvers-gateway/
          sudo chmod +x /opt/danvers-gateway/DanversGateway
          if systemctl list-units --type=service --all | grep -q "gateway.service"; then
            sudo systemctl stop gateway.service
          fi
          sudo cp gateway.service /etc/systemd/system/
          sudo chown -R svc_devdog:svc_devdog /opt/danvers-gateway
          sudo systemctl daemon-reload
          sudo systemctl enable gateway.service
          sudo systemctl start gateway.service
          sudo systemctl status gateway.service